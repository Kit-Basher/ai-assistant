[pytest]
pythonpath = .
markers =
    full_pytest_triage_excluded: exact v0.2.2 full-pytest failure inventory cases excluded from the default safe source-tree suite while covered by named release proofs.
    installed_product: requires the promoted installed Personal Agent runtime or live local API and belongs in installed-product smoke gates.
    requires_systemd_user: requires user systemd service control and belongs in installed-product or fixture service gates.
    destructive_fixture: mutates only isolated fixture state and must not touch live user data.
    external_provider: requires a fake/sandbox/opt-in external provider rather than the default source-tree suite.
    slow: intentionally long-running proof or soak test.
