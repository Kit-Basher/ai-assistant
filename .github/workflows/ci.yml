name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install -r requirements.txt pytest

      - name: Compile release-gate Python targets
        run: python scripts/release_gate.py --py-compile-only

      - name: Run release smoke
        run: python scripts/release_smoke.py

      - name: Run release gate unit tests
        run: python -m pytest -q tests/test_release_gate.py tests/test_release_smoke.py
